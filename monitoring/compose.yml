---
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: always
    logging: *default-logging
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    networks:
      - monitoring_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: always
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.textfile.directory=/textfile
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
      - node_exporter_textfile:/textfile:ro
    networks:
      - monitoring_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9100"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    # cAdvisor needs privileged host access to collect full Docker/container metrics.
    # It remains on the internal monitoring network with no published host port.
    privileged: true
    restart: always
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - /:/rootfs:ro,rslave
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/lib/containerd:/var/lib/containerd:ro
    networks:
      - monitoring_internal

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: always
    logging: *default-logging
    ports:
      - 127.0.0.1:3000:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./config/grafana-media-stack-overview.json:/var/lib/grafana/dashboards/media-stack-overview.json:ro
      - ./config/grafana-qbittorrent-vpn.json:/var/lib/grafana/dashboards/qbittorrent-vpn.json:ro
    depends_on:
      - prometheus
    networks:
      - default
      - monitoring_internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scrutiny:
    # This image intentionally tracks Scrutiny's master branch; no stable versioned omnibus tag is used here.
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    cap_add:
      - SYS_RAWIO
    ports:
      - 127.0.0.1:8085:8080
    volumes:
      - scrutiny_config:/opt/scrutiny/config
      - scrutiny_influxdb:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
      - /dev/sdd:/dev/sdd
      - /dev/sde:/dev/sde
      - /dev/nvme0n1:/dev/nvme0n1
    restart: unless-stopped
    logging: *default-logging

networks:
  monitoring_internal:
    internal: true

volumes:
  prometheus_data:
    external: true
    name: media-stack_prometheus_data
  grafana_data:
    external: true
    name: media-stack_grafana_data
  node_exporter_textfile:
    external: true
    name: media-stack_node_exporter_textfile
  scrutiny_config:
    name: media-stack_scrutiny_config
  scrutiny_influxdb:
    name: media-stack_scrutiny_influxdb
