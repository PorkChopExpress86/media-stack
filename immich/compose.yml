---
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-immich-redis-env: &immich_redis_env
  REDIS_HOSTNAME: immich_redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    user: "1000:1001"
    environment: *immich_redis_env
    # extends:
    #   file: ./immich/config/hwaccel.transcoding.yml
    #   service: nvenc # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - immich_server_data:/data
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ./immich/.env
    ports:
      - 127.0.0.1:2283:2283
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    logging: *default-logging
    networks:
      media_proxy:
        aliases:
          - immich_server
      immich_internal:
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_ML_VERSION:-${IMMICH_VERSION:-release}}
    user: "1000:1001"
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example: set IMMICH_ML_VERSION=v2-cuda and enable service cuda below.
    # extends:
    # Uncomment this section for hardware acceleration - see:
    # https://immich.app/docs/features/ml-hardware-acceleration
    #   file: ./immich/config/hwaccel.ml.yml
    #   service: cuda # set to one of [armnn, cuda, openvino, openvino-wsl]
    # For WSL2 use a `-wsl` variant where applicable.
    volumes:
      - model-cache:/cache
    env_file:
      - ./immich/.env
    environment: *immich_redis_env
    read_only: true
    tmpfs:
      - /tmp
      - /run
    restart: always
    logging: *default-logging
    networks:
      - immich_internal
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:2d1463258f2764328496376f5d965f20c6a67f66ea2b06dc42af351f75248792
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - immich_redis_data:/data
    read_only: true
    tmpfs:
      - /tmp
      - /run
    restart: always
    logging: *default-logging
    networks:
      immich_internal:
        aliases:
          - immich_redis

  database:
    container_name: immich_postgres
    image: ${DB_IMAGE}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - immich_internal

networks:
  media_proxy:
    external: true
    name: media_proxy
  immich_internal:
    internal: true

volumes:
  model-cache:
    external: true
    name: media-stack_model-cache
  immich_redis_data:
    external: true
    name: media-stack_immich_redis_data
  immich_server_data:
    external: true
    name: media-stack_immich_server_data
