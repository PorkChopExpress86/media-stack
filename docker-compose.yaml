---
# Shared logging config — caps each container at 30 MB (3 × 10 MB)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    container_name: nginx
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    logging: *default-logging
    ports:
      # These ports are in format <host-port>:<container-port>
      - 80:80 # Public HTTP Port
      - 443:443 # Public HTTPS Port
      - 127.0.0.1:81:81 # Admin Web Port (localhost only)
      - 19132:19132/udp # Minecraft Bedrock Port
      - 19133:19133/udp # Minecraft Bedrock Creative Port
    environment:
      DISABLE_IPV6: 'true'
    volumes:
      - nginx_data:/data
      - letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  derbynet:
    container_name: derbynet
    image: jeffpiazza/derbynet_server:amd64
    ports:
      - 8050:80
    volumes:
      - ./data/derbynet:/var/lib/derbynet
      - /etc/localtime:/etc/localtime:ro
      # edit passwords on host system
      # `sudo vim /var/lib/docker/volumes/faraday_derbyet_data/_data/config-roles.inc`
    restart: always
    logging: *default-logging

  vpn:
    image: qmcgaw/gluetun:latest
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8389:8388/udp # Shadowsocks
      # Radarr
      - 7878:7878
      # Sonarr
      - 8989:8989
      # Prowlarr
      - 9696:9696
      - 1080:1080/tcp # SOCKS5 proxy
      # # Bazarr
      - 6767:6767
      # Qbittorrent
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
      - 40025:40025
      - 40025:40025/udp
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - gluetun_data:/gluetun
    environment:
      # See https:\github.com/qdm12/gluetun/wiki
      - VPN_SERVICE_PROVIDER=private internet access
      - OPENVPN_USER=${vpn_username}
      - OPENVPN_PASSWORD=${vpn_password}
      # - SERVER_REGIONS=Netherlands
      - SERVER_REGIONS=CA Toronto
      - TZ=${TZ:-America/Chicago}
      # - PORT_FORWARD_ONLY=true
      - VPN_PORT_FORWARDING=on
      # - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/piaportforward.json
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9999"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ######### *ARR SERVERS#########################################################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - prowlarr_data:/config
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  decluttarr:
    image: ghcr.io/manimatter/decluttarr:latest
    container_name: decluttarr
    restart: always
    logging: *default-logging
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: 1000
      PGID: 1000
      LOG_LEVEL: INFO
      TEST_RUN: "false"
      TIMER: 60

      # Jobs
      REMOVE_FAILED_DOWNLOADS: true
      REMOVE_FAILED_IMPORTS: true
      REMOVE_METADATA_MISSING: true
      REMOVE_ORPHANS: true
      REMOVE_SLOW: true
      REMOVE_STALLED: true

      # Instances
      RADARR: >
        - base_url: "http://vpn:7878"
          api_key: "${RADARR_API_KEY}"

      SONARR: >
        - base_url: "http://vpn:8989"
          api_key: "${SONARR_API_KEY}"

      PROWLARR: >
        - base_url: "http://vpn:9696"
          api_key: "${PROWLARR_API_KEY}"

      # Download Clients
      QBITTORRENT: >
        - base_url: "http://vpn:8080"
          username: "${QBITTORRENT_USER}"
          password: "${QBITTORRENT_PASS}"
    volumes:
      - decluttarr_data:/config

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - radarr_data:/config
      - ${movies}:/movies
      - ${other_movies}:/other_movies
      - ${kids_movies}:/kids_movies
      - ${qbittorrent_downloads}:/downloads
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - sonarr_data:/config
      - ${tv_shows}:/tv_shows
      - ${kids_tv_shows}:/kids_tv_shows
      - ${other_shows}:/other_shows
      - ${qbittorrent_downloads}:/downloads
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      # ports:
      # Bazarr
      # - 6767:6767
    volumes:
      - bazarr_data:/config
      - ${movies}:/movies
      - ${tv_shows}:/tv_shows
      - ${kids_movies}:/kids_movies
      - ${kids_tv_shows}:/kids_tv_shows
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_data:/config
      - ${qbittorrent_downloads}:/downloads
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    ports:
      - 13378:80
    volumes:
      - audiobookshelf_data:/config
      - ${audiobooks}:/audiobooks
      - ${podcasts}:/podcasts
    environment:
      - TZ=${TZ:-America/Chicago}
    restart: always
    logging: *default-logging

  # IMMICH SERVER
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: config/hwaccel.transcoding.yml
    #   service: nvenc # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - immich_server_data:/data
      # Do not edit the next line.
      # To change the media storage location, edit `UPLOAD_LOCATION` in `.env`
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    # environment:
    #   - DB_SKIP_MIGRATIONS=true
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    logging: *default-logging
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends:
    # Uncomment this section for hardware acceleration - see:
    # https://immich.app/docs/features/ml-hardware-acceleration
    # file: config/hwaccel.ml.yml
    # service: cuda # set to one of [armnn, cuda, openvino, openvino-wsl]
    # For WSL2 use a `-wsl` variant where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    logging: *default-logging
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:2d1463258f2764328496376f5d965f20c6a67f66ea2b06dc42af351f75248792
    healthcheck:
      test: redis-cli ping || exit 1
    volumes:
      - immich_redis_data:/data
    restart: always
    logging: *default-logging

  database:
    container_name: immich_postgres
    image: ${DB_IMAGE}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Do not edit the next line.
      # To change the database storage location, edit `DB_DATA_LOCATION` in `.env`
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  soundboard:
    build: ./soundboard
    container_name: soundboard
    ports:
      - 8055:8055
    volumes:
      - soundboard_data:/data
    environment:
      - SOUNDS_DIR=/data/sounds
      - CONFIG_DIR=/data/config
      - TZ=${TZ:-America/Chicago}
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8055/api/sounds"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  actual_server:
    container_name: actual_server
    image: docker.io/actualbudget/actual-server:latest
    ports:
      - '5006:5006'
    volumes:
      - ./data/budget:/data
    restart: always
    logging: *default-logging

  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:latest
    container_name: pinchflat
    environment:
      - TZ=${TZ:-America/Chicago}
    ports:
      - '8945:8945'
    volumes:
      - pinchflat_data:/config
      - "${pinchflat_downloads}:/downloads"
    restart: always
    logging: *default-logging

  jellyfin:
    image: jellyfin/jellyfin:latest
    user: "1000:1000"
    container_name: jellyfin
    environment:
      - TZ=${TZ:-America/Chicago}
      - JELLYFIN_PublishedServerUrl=${jellyfin_url}
    group_add:
      - "992"
      - "44"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      # Media Libraries
      - ${movies}:/media/movies
      - ${tv_shows}:/media/tv_shows
      - ${kids_movies}:/media/kids_movies
      - ${kids_tv_shows}:/media/kids_tv_shows
      - ${other_movies}:/media/other_movies
      - ${other_shows}:/media/other_shows
      - ${pinchflat_downloads}:/pinchflat
      - ${home_movies}:/media/home_movies
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    restart: 'unless-stopped'
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      - VERSION=docker
      - PLEX_CLAIM=${plex_claim}
    volumes:
      - plex_data:/config
      # Media Libraries
      - ${movies}:/media/movies
      - ${tv_shows}:/media/tv_shows
      - ${kids_movies}:/media/kids_movies
      - ${kids_tv_shows}:/media/kids_tv_shows
      - ${other_movies}:/media/other_movies
      - ${other_shows}:/media/other_shows
      - ${music}:/media/music
      - ${pinchflat_downloads}:/pinchflat
      - ${home_movies}:/media/home_movies
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 32400:32400
    restart: always
    logging: *default-logging

  minecraft-survival:
    image: itzg/minecraft-bedrock-server:latest
    container_name: minecraft-survival
    environment:
      EULA: "TRUE"
      GAMEMODE: survival
      DIFFICULTY: easy
      PVP: "true"
      ALLOW_CHEATS: "false"
      MAX_PLAYERS: 10
      LEVEL_NAME: "Survival World"
      LEVEL_SEED: "42"
      LEVEL_TYPE: "DEFAULT"
    # ports:
    #   - "19132:19132/udp"
    volumes:
      - ./data/survival:/data
    restart: unless-stopped
    logging: *default-logging
    stdin_open: true
    tty: true

  # Creative Mode Server
  minecraft-creative:
    image: itzg/minecraft-bedrock-server:latest
    container_name: minecraft-creative
    environment:
      EULA: "TRUE"
      GAMEMODE: creative
      DIFFICULTY: peaceful
      PVP: "false"
      ALLOW_CHEATS: "true"
      MAX_PLAYERS: 10
      LEVEL_NAME: "Creative World"
      LEVEL_SEED: "42"
      LEVEL_TYPE: "DEFAULT"
    # ports:
    #   - "19133:19132/udp"
    volumes:
      - ./data/creative:/data
    restart: unless-stopped
    logging: *default-logging
    stdin_open: true
    tty: true

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    environment:
      - TZ=${TZ:-America/Chicago}
    network_mode: host
    # ports:
    #   - 8123:8123
    volumes:
      - homeassistant_data:/config
    restart: always
    logging: *default-logging

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: always
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${email}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${email}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=smtp.gmail.com
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=587
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${email}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${gmail_app_passwd}
      - WATCHTOWER_NOTIFICATION_EMAIL_DELAY=2
      - DOCKER_API_VERSION=1.52
    command: --cleanup --interval 21600

  ######### MONITORING STACK #########################################################
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: always
    logging: *default-logging
    environment:
      - TZ=${TZ:-America/Chicago}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - 3000:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - TZ=${TZ:-America/Chicago}
    restart: always
    logging: *default-logging
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    devices:
      - /dev/kmsg:/dev/kmsg
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: always
    logging: *default-logging
    command:
      - '--allow_dynamic_housekeeping=false'
      - '--housekeeping_interval=30s'
      - '--docker_only=true'

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    restart: always
    logging: *default-logging
    pid: host

  sonarr-exporter:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: sonarr-exporter
    command: [ "sonarr" ]
    environment:
      PORT: 9707
      URL: "http://vpn:8989"
      APIKEY: "${SONARR_API_KEY}"
      ENABLE_ADDITIONAL_METRICS: true
      ENABLE_UNKNOWN_QUEUE_ITEMS: false
    restart: always
    logging: *default-logging
    depends_on:
      vpn:
        condition: service_healthy

  radarr-exporter:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: radarr-exporter
    command: [ "radarr" ]
    environment:
      PORT: 9708
      URL: "http://vpn:7878"
      APIKEY: "${RADARR_API_KEY}"
      ENABLE_ADDITIONAL_METRICS: true
      ENABLE_UNKNOWN_QUEUE_ITEMS: false
    restart: always
    logging: *default-logging
    depends_on:
      vpn:
        condition: service_healthy

  prowlarr-exporter:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: prowlarr-exporter
    command: [ "prowlarr" ]
    environment:
      PORT: 9709
      URL: "http://vpn:9696"
      APIKEY: "${PROWLARR_API_KEY}"
      ENABLE_ADDITIONAL_METRICS: true
    restart: always
    logging: *default-logging
    depends_on:
      vpn:
        condition: service_healthy

volumes:
  soundboard_data:
  nginx_data:
  letsencrypt:
  prowlarr_data:
  radarr_data:
  sonarr_data:
  qbittorrent_data:
  audiobookshelf_data:
  model-cache:
  bazarr_data:
  gluetun_data:
  immich_redis_data:
  immich_server_data:
  pinchflat_data:
  decluttarr_data:
  jellyfin_config:
  jellyfin_cache:
  plex_data:
  homeassistant_data:
  prometheus_data:
  grafana_data:
