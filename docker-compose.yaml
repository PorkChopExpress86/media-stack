---
# Shared logging config — caps each container at 30 MB (3 × 10 MB)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    container_name: nginx
    image: 'jc21/nginx-proxy-manager@sha256:2aa69b382a384b676c0d4f1d6f2eac40ecd478fcf7af1cfb3f9f1d3cd0c81e12'
    restart: always
    logging: *default-logging
    ports:
      # These ports are in format <host-port>:<container-port>
      - 80:80 # Public HTTP Port
      - 443:443 # Public HTTPS Port
      - 127.0.0.1:81:81 # Admin Web Port (localhost only)
      - 19132:19132/udp # Minecraft Bedrock Port
      - 19133:19133/udp # Minecraft Bedrock Creative Port
    environment:
      DISABLE_IPV6: 'true'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - nginx_data:/data
      - letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  derbynet:
    container_name: derbynet
    image: jeffpiazza/derbynet_server@sha256:cf57ec34d5207f842ad961edfb9929b145dac6f4f2691a8396859e68d4e84ccd
    user: "1000:1000"
    group_add:
      - "101"
      - "0"
    ports:
      - 8050:80
    volumes:
      - ./proxied-apps/data/derbynet:/var/lib/derbynet
      - ./proxied-apps/data/derbynet/nginx:/var/lib/nginx
      - ./proxied-apps/data/derbynet/nginx-log:/var/log/nginx
      - ./proxied-apps/data/derbynet/php84:/var/log/php84
      - ./proxied-apps/data/derbynet/run-nginx:/run/nginx
      - ./proxied-apps/data/derbynet/run:/var/run/php
      - /etc/localtime:/etc/localtime:ro
      # edit passwords on host system
      # `sudo vim /var/lib/docker/volumes/faraday_derbyet_data/_data/config-roles.inc`
    restart: always
    logging: *default-logging

  vpn:
    image: qmcgaw/gluetun@sha256:725d3e51091dde4ca43e3e3f26e2e6d3d0ccc66821e92d505c3da04958f7d472
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8389:8388/udp # Shadowsocks
      # Radarr
      - 7878:7878
      # Sonarr
      - 8989:8989
      # Prowlarr
      - 9696:9696
      - 1080:1080/tcp # SOCKS5 proxy
      # # Bazarr
      - 6767:6767
      # Qbittorrent
      - 8080:8080
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - gluetun_data:/gluetun
      - ./scripts/linux/qb-port-sync.sh:/usr/local/bin/qb-port-sync.sh:ro
    environment:
      # See https:\github.com/qdm12/gluetun/wiki
      - VPN_SERVICE_PROVIDER=private internet access
      - OPENVPN_USER=${vpn_username}
      - OPENVPN_PASSWORD=${vpn_password}
      # - SERVER_REGIONS=Netherlands
      - SERVER_REGIONS=CA Toronto
      - TZ=${TZ:-America/Chicago}
      # - PORT_FORWARD_ONLY=true
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c '/usr/local/bin/qb-port-sync.sh up "{{PORT}}" "{{VPN_INTERFACE}}"'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c '/usr/local/bin/qb-port-sync.sh down'
      # - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/piaportforward.json
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9999"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ######### *ARR SERVERS#########################################################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr@sha256:c5de2a8758a05594319263e7691c1dce56899442ed1720d6eca216c0958f4caf
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - prowlarr_data:/config
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-America/Chicago}
    read_only: true
    tmpfs:
      - /tmp
      - /run
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  decluttarr:
    image: ghcr.io/manimatter/decluttarr@sha256:1e93192e9477cb01591de2ddac12d503662e2659792448e811b74bdb58e07ae4
    container_name: decluttarr
    restart: always
    logging: *default-logging
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: 1000
      PGID: 1000
      LOG_LEVEL: INFO
      TEST_RUN: "false"
      TIMER: 60

      # Jobs
      REMOVE_FAILED_DOWNLOADS: true
      REMOVE_FAILED_IMPORTS: true
      REMOVE_METADATA_MISSING: true
      REMOVE_ORPHANS: true
      REMOVE_SLOW: true
      REMOVE_STALLED: true

      # Instances
      RADARR: >
        - base_url: "http://vpn:7878"
          api_key: "${RADARR_API_KEY}"

      SONARR: >
        - base_url: "http://vpn:8989"
          api_key: "${SONARR_API_KEY}"

      PROWLARR: >
        - base_url: "http://vpn:9696"
          api_key: "${PROWLARR_API_KEY}"

      # Download Clients
      QBITTORRENT: >
        - base_url: "http://vpn:8080"
          username: "${QBITTORRENT_USER}"
          password: "${QBITTORRENT_PASS}"
    volumes:
      - decluttarr_data:/config
    read_only: true
    tmpfs:
      - /tmp
      - /run

  radarr:
    image: lscr.io/linuxserver/radarr@sha256:b01097ad2d948c9f5eca39eb60bb529e2e55b0738c4bf7db09383bef0abab59d
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - radarr_data:/config
      - ${movies}:/movies
      - ${other_movies}:/other_movies
      - ${kids_movies}:/kids_movies
      - ${qbittorrent_downloads}:/downloads
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr@sha256:e6c9a091735fede0c2a205c69e7d4c2f0188eaf2bec7e42d8a26c017e5f2a910
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - sonarr_data:/config
      - ${tv_shows}:/tv_shows
      - ${kids_tv_shows}:/kids_tv_shows
      - ${other_shows}:/other_shows
      - ${qbittorrent_downloads}:/downloads
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  bazarr:
    image: lscr.io/linuxserver/bazarr@sha256:7563f01bf27554df58e10544a4bb83479258883315a31cd1c929293e908144d0
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      # ports:
      # Bazarr
      # - 6767:6767
    volumes:
      - bazarr_data:/config
      - ${movies}:/movies
      - ${tv_shows}:/tv_shows
      - ${kids_movies}:/kids_movies
      - ${kids_tv_shows}:/kids_tv_shows
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent@sha256:8f7a1da9644340c737e3211ecc910a416d4295076e6b2824a4afcd1f4e3576e2
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_data:/config
      - ${qbittorrent_downloads}:/downloads
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf@sha256:a44ed89b3e845faa1f7d353f2cc89b2fcd8011737dd14075fa963cf9468da3a5
    user: "1000:1000"
    ports:
      - 13378:80
    volumes:
      - audiobookshelf_data:/config
      - audiobookshelf_metadata:/metadata
      - ${audiobooks}:/audiobooks
      - ${podcasts}:/podcasts
    environment:
      - TZ=${TZ:-America/Chicago}
    restart: always
    logging: *default-logging

  # IMMICH SERVER
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    user: "1000:1000"
    environment: &immich_redis_env
      REDIS_HOSTNAME: immich_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # extends:
    #   file: ./immich/config/hwaccel.transcoding.yml
    #   service: nvenc # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - immich_server_data:/data
      # Do not edit the next line.
      # To change the media storage location, edit `UPLOAD_LOCATION` in `.env`
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    # environment:
    #   - DB_SKIP_MIGRATIONS=true
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    logging: *default-logging
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example: set IMMICH_ML_VERSION=v2-cuda and enable service cuda below.
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_ML_VERSION:-${IMMICH_VERSION:-release}}
    user: "1000:1000"
    # extends:
    # Uncomment this section for hardware acceleration - see:
    # https://immich.app/docs/features/ml-hardware-acceleration
    #   file: ./immich/config/hwaccel.ml.yml
    #   service: cuda # set to one of [armnn, cuda, openvino, openvino-wsl]
    # For WSL2 use a `-wsl` variant where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    environment: *immich_redis_env
    read_only: true
    tmpfs:
      - /tmp
      - /run
    restart: always
    logging: *default-logging
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:2d1463258f2764328496376f5d965f20c6a67f66ea2b06dc42af351f75248792
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - immich_redis_data:/data
    read_only: true
    tmpfs:
      - /tmp
      - /run
    restart: always
    logging: *default-logging

  database:
    container_name: immich_postgres
    image: ${DB_IMAGE}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Do not edit the next line.
      # To change the database storage location, edit `DB_DATA_LOCATION` in `.env`
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  actual_server:
    container_name: actual_server
    image: docker.io/actualbudget/actual-server@sha256:b0e732e2c41b3dc468a71548e88ef76d3f0c157fc43d15fa05d14ec1c5747e1e
    user: "1000:1000"
    ports:
      - '5006:5006'
    volumes:
      - ./lan-apps/data/budget:/data
    restart: always
    logging: *default-logging

  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat@sha256:01b4f98aabaf3f5fe394213f7a32578c9e84e42080f52e2f8334021a4473b202
    container_name: pinchflat
    user: "1000:1000"
    environment:
      - TZ=${TZ:-America/Chicago}
    ports:
      - '8945:8945'
    volumes:
      - pinchflat_data:/config
      - "${pinchflat_downloads}:/downloads"
    restart: always
    logging: *default-logging

  jellyfin:
    image: jellyfin/jellyfin@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
    user: "1000:1000"
    container_name: jellyfin
    environment:
      - TZ=${TZ:-America/Chicago}
      - JELLYFIN_PublishedServerUrl=${jellyfin_url}
    group_add:
      - "992"
      - "44"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      # Media Libraries
      - ${movies}:/media/movies
      - ${tv_shows}:/media/tv_shows
      - ${kids_movies}:/media/kids_movies
      - ${kids_tv_shows}:/media/kids_tv_shows
      - ${other_movies}:/media/other_movies
      - ${other_shows}:/media/other_shows
      - ${pinchflat_downloads}:/pinchflat
      - ${home_movies}:/media/home_movies
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    restart: 'unless-stopped'
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  plex:
    image: lscr.io/linuxserver/plex@sha256:e5c7c283b242966416a4bed2d666acf6f3fb8f957c704be8333f8dc987364825
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      - VERSION=docker
      - PLEX_CLAIM=${plex_claim}
    volumes:
      - plex_data:/config
      # Media Libraries
      - ${movies}:/media/movies
      - ${tv_shows}:/media/tv_shows
      - ${kids_movies}:/media/kids_movies
      - ${kids_tv_shows}:/media/kids_tv_shows
      - ${other_movies}:/media/other_movies
      - ${other_shows}:/media/other_shows
      - ${music}:/media/music
      - ${pinchflat_downloads}:/pinchflat
      - ${home_movies}:/media/home_movies
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 32400:32400
    restart: always
    logging: *default-logging

  minecraft-survival:
    image: itzg/minecraft-bedrock-server@sha256:406b421c5394d7fc957a2b51ca30ebd38dfe06bdee70b817ed86ac16c7bccc6b
    container_name: minecraft-survival
    user: "1000:1000"
    environment:
      EULA: "TRUE"
      GAMEMODE: survival
      DIFFICULTY: easy
      PVP: "true"
      ALLOW_CHEATS: "false"
      MAX_PLAYERS: 10
      LEVEL_NAME: "Survival World"
      LEVEL_SEED: "42"
      LEVEL_TYPE: "DEFAULT"
    # ports:
    #   - "19132:19132/udp"
    volumes:
      - ./proxied-apps/data/survival:/data
    restart: unless-stopped
    logging: *default-logging
    stdin_open: true
    tty: true

  # Creative Mode Server
  minecraft-creative:
    image: itzg/minecraft-bedrock-server@sha256:406b421c5394d7fc957a2b51ca30ebd38dfe06bdee70b817ed86ac16c7bccc6b
    container_name: minecraft-creative
    user: "1000:1000"
    environment:
      EULA: "TRUE"
      GAMEMODE: creative
      DIFFICULTY: peaceful
      PVP: "false"
      ALLOW_CHEATS: "true"
      MAX_PLAYERS: 10
      LEVEL_NAME: "Creative World"
      LEVEL_SEED: "42"
      LEVEL_TYPE: "DEFAULT"
    # ports:
    #   - "19133:19132/udp"
    volumes:
      - ./proxied-apps/data/creative:/data
    restart: unless-stopped
    logging: *default-logging
    stdin_open: true
    tty: true

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant@sha256:ae0800c81fea16bc1241ce03bddb9c6260566e90f58b09d3e5a629e4f68bdc0b
    container_name: homeassistant
    environment:
      - TZ=${TZ:-America/Chicago}
    # network_mode: host is intentionally required here and must NOT be changed.
    # HomeKit Bridge uses mDNS (UDP multicast on 224.0.0.251:5353) for both
    # initial pairing and ongoing keep-alive with the Apple home hub. Docker bridge
    # networks do not pass multicast — the avahi reflector alternative is
    # documented by HA but adds instability for lock/light control. See:
    # https://www.home-assistant.io/integrations/homekit/#docker-network-isolation
    network_mode: host
    volumes:
      - homeassistant_data:/config
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    mem_reservation: 256m
    cpus: "2.0"
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s

  watchtower:
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: watchtower
    user: "1000:1000"
    group_add:
      - "${DOCKER_GID}"
    restart: always
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${email}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${email}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=smtp.gmail.com
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=587
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${email}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${gmail_app_passwd}
      - WATCHTOWER_NOTIFICATION_EMAIL_DELAY=2
      - DOCKER_API_VERSION=1.52
    command: --cleanup --interval 21600 --monitor-only

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: always
    logging: *default-logging
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: always
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.textfile.directory=/textfile
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
      - node_exporter_textfile:/textfile:ro

  qbittorrent-metrics:
    image: python:3.12-alpine
    container_name: qbittorrent_metrics
    restart: always
    logging: *default-logging
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    volumes:
      - node_exporter_textfile:/textfile
      - ./scripts/linux/qbittorrent-metrics.py:/app/qbittorrent-metrics.py:ro
    environment:
      QB_WEBUI_URL: http://127.0.0.1:8080
      QB_WEBUI_USER: ${QBITTORRENT_USER}
      QB_WEBUI_PASSWORD: ${QBITTORRENT_PASS}
      GLUETUN_HEALTH_URL: http://127.0.0.1:9999
      METRICS_FILE: /textfile/qbittorrent.prom
      POLL_INTERVAL: 30
    command: ["python", "/app/qbittorrent-metrics.py"]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    restart: always
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - /:/rootfs:ro,rslave
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: always
    logging: *default-logging
    ports:
      - 3000:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/config/grafana-media-stack-overview.json:/var/lib/grafana/dashboards/media-stack-overview.json:ro
      - ./monitoring/config/grafana-qbittorrent-vpn.json:/var/lib/grafana/dashboards/qbittorrent-vpn.json:ro
    depends_on:
      - prometheus

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      - NPM_DB_PATH=/npm-data/database.sqlite
      - TEST_LOG_PATH=/workspace/test.log
      - TEST_TIMEOUT_SECONDS=${TEST_TIMEOUT_SECONDS:-10}
      - TEST_DOMAIN=${TEST_DOMAIN:-}
    user: "1000:1000"
    volumes:
      - .:/workspace
      - nginx_data:/npm-data:ro
    working_dir: /workspace
    restart: "no"
    logging: *default-logging

volumes:
  nginx_data:
  letsencrypt:
  prowlarr_data:
  radarr_data:
  sonarr_data:
