global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'media-server'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker container metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'media-server'

  # System/host metrics via Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'media-server'

  # Sonarr metrics
  - job_name: 'sonarr'
    static_configs:
      - targets: ['sonarr-exporter:9707']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sonarr'

  # Radarr metrics
  - job_name: 'radarr'
    static_configs:
      - targets: ['radarr-exporter:9708']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'radarr'

  # Prowlarr metrics
  - job_name: 'prowlarr'
    static_configs:
      - targets: ['prowlarr-exporter:9709']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prowlarr'
